<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Conseils de jardinage accessibles</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Conseils de jardinage simples</h1>
</header>

<main>

<section class="etape etape-choix" id="etape0">
    <div class="texte">
        <h2>Qu'aimeriez-vous jardiner ?</h2>
        <p>Choisissez une catégorie pour commencer.</p>

        <!-- Bouton écouter séparé -->
        <div class="bouton-audio-container">
            <button class="bouton audio" id="btnAudio0">
                🔊 Écouter le texte
            </button>
        </div>

        <!-- Boutons choix sur la même ligne -->
        <div class="boutons-choix-container">
            <button class="bouton choix" onclick="window.location.href='fleurs.html'">
                🌸 Fleurs
            </button>
            <button class="bouton choix" onclick="window.location.href='legumes.html'">
                🥕 Légumes
            </button>
            <button class="bouton choix" onclick="window.location.href='fruits.html'">
                🍎 Fruits
            </button>
        </div>
    </div>

    <!-- L'audio placé à l'intérieur de la section pour éviter les problèmes -->
    <audio id="audio0">
        <source src="audio0.mp3" type="audio/mpeg">
    </audio>
</section>

<script>
    // Bouton audio spécifique
    const btnAudio0 = document.getElementById('btnAudio0');
    const audio0 = document.getElementById('audio0');

    btnAudio0.addEventListener('click', () => {
        audio0.play(); // Lecture audio
        btnAudio0.classList.add('active-audio');
        setTimeout(() => btnAudio0.classList.remove('active-audio'), 500);
    });
</script>

</body>
</html>

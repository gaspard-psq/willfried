<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jardinage facile pour Wilfried</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Jardinage Facile</h1>
    <nav role="navigation" aria-label="Menu principal">
      <a href="#fleurs" class="btn" role="button">Fleurs</a>
      <a href="#legumes" class="btn" role="button">Légumes</a>
      <a href="#conseils" class="btn" role="button">Conseils</a>
    </nav>
  </header>

  <main>
    <section id="fleurs" aria-labelledby="fleurs-title">
      <h2 id="fleurs-title">Les Fleurs</h2>
      <p>Apprenez à planter et entretenir vos fleurs facilement.</p>
      <img src="fleurs.jpg" alt="Un jardin coloré avec des fleurs" width="600" height="400">
    </section>

    <section id="legumes" aria-labelledby="legumes-title">
      <h2 id="legumes-title">Les Légumes</h2>
      <p>Découvrez comment cultiver vos légumes avec peu d’effort.</p>
      <img src="legumes.jpg" alt="Potager avec légumes variés" width="600" height="400">
    </section>

    <section id="conseils" aria-labelledby="conseils-title">
      <h2 id="conseils-title">Conseils pratiques</h2>
      <p>Conseils simples pour réussir votre jardinage.</p>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Jardinage Facile</p>
  </footer>
</body>
</html>
